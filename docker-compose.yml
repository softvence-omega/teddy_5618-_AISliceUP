version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teddy-chat-app
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - API_BASE_URL=${API_BASE_URL}

