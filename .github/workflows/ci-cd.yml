name: CI/CD Pipeline for SliceUp

on:
  push:
    branches: [main]

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t roksanakter/sliceup:latest .

      - name: Push Docker Image to Docker Hub
        run: docker push roksanakter/sliceup:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Pull latest image
            docker pull roksanakter/sliceup:latest

            # Stop and remove old container if exists
            docker stop sliceup || true
            docker rm sliceup || true

            # Run new container with environment variables
            docker run -d -p 8000:8000 --env-file /root/.env --name sliceup roksanakter/sliceup:latest
