name: CI/CD Pipeline for SliceUp

on:
  push:
    branches: [main]

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Log in to Docker Hub
      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3️⃣ Build Docker Image
      - name: Build Docker Image
        run: docker build -t roksanakter/sliceup:latest .

      # 4️⃣ Push Docker Image
      - name: Push Docker Image to Docker Hub
        run: docker push roksanakter/sliceup:latest

      # 5️⃣ Logout from Docker Hub for security
      - name: Docker Logout
        run: docker logout

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      # 6️⃣ Deploy via SSH using appleboy/ssh-action
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Pulling latest Docker image..."
            docker pull roksanakter/sliceup:latest

            echo "Stopping old container (if exists)..."
            docker stop sliceup || true
            docker rm sliceup || true

            echo "Starting new container..."
            docker run -d \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file /root/.env \
              --name sliceup \
              roksanakter/sliceup:latest
            echo "Deployment completed!"